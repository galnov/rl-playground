<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lunar Lander - Manual RL Playground</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation; /* Prevents double-tap zoom */
        }

        h1 { margin: 0 0 5px 0; color: #BB86FC; letter-spacing: 1px; text-align: center; }
        .subtitle { color: #aaaaaa; margin-bottom: 15px; font-size: 14px; text-align: center; }

        /* Responsive Game Wrapper */
        #game-wrapper {
            position: relative;
            background-color: #1e1e24;
            border: 2px solid #BB86FC;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            width: 95%;
            max-width: 800px;
            aspect-ratio: 8 / 5; /* Maintains the 800x500 ratio natively */
        }

        canvas { 
            display: block; 
            border-radius: 6px; 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
        }

        /* Responsive Dashboard */
        #dashboard {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            background: #23232c;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            margin-top: 15px;
            width: 95%;
            max-width: 800px;
            box-sizing: border-box;
            gap: 10px;
        }

        .metric {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-width: 80px; /* Allows wrapping on mobile */
        }

        .metric:not(:last-child) {
            border-right: 1px solid #444;
        }

        .metric-title { font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .metric-value { font-size: 24px; font-weight: bold; font-family: monospace; transition: color 0.2s; }
        
        .safe { color: #4CAF50; }
        .warning { color: #FFEB3B; }
        .danger { color: #F44336; }

        /* Overlays & Buttons */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            display: none;
            z-index: 10;
        }

        #overlay h2 { font-size: 32px; margin: 0 0 10px 0; text-align: center; }
        #overlay p { color: #ccc; font-size: 18px; margin-bottom: 20px; text-align: center; padding: 0 10px; }
        
        button.action-btn {
            background-color: #BB86FC;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.2s;
        }

        button.action-btn:hover { background-color: #9965f4; transform: scale(1.05); }
        button.action-btn:active { transform: scale(0.95); }

        .controls {
            margin-top: 15px;
            color: #777;
            font-size: 14px;
            text-align: center;
            padding: 0 10px;
        }
        
        kbd {
            background: #333; padding: 3px 8px; border-radius: 4px;
            color: #fff; font-family: monospace; border-bottom: 2px solid #111;
        }

        /* Mobile Touch Controls */
        #mobile-controls {
            display: none; /* Hidden by default (desktop) */
            width: 95%;
            max-width: 800px;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .touch-btn {
            flex: 1;
            padding: 20px 0;
            font-size: 20px;
            font-weight: bold;
            background-color: #23232c;
            color: #BB86FC;
            border: 2px solid #BB86FC;
            border-radius: 8px;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.1s;
        }

        .touch-btn.active {
            background-color: #BB86FC;
            color: #121212;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            #mobile-controls { display: flex; } /* Show touch controls */
            .controls { display: none; } /* Hide keyboard instructions */
            .metric:not(:last-child) { border-right: none; } /* Clean up grid on mobile */
            .metric-value { font-size: 18px; }
            h1 { font-size: 24px; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <h1>LUNAR LANDER</h1>
    <div class="subtitle">RL Environment - Cross-Platform Playground</div>

    <div id="game-wrapper">
        <!-- Internal resolution is locked to 800x500. CSS scales it visually. -->
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="overlay">
            <h2 id="result-title">Crashed!</h2>
            <p id="result-desc">You came in too fast.</p>
            <button onclick="resetGame()" class="action-btn">Play Again</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="metric">
            <span class="metric-title">Reward</span>
            <span class="metric-value" id="ui-reward">0.0</span>
        </div>
        <div class="metric">
            <span class="metric-title">Fuel</span>
            <span class="metric-value" id="ui-fuel">1000</span>
        </div>
        <div class="metric">
            <span class="metric-title">Vertical Speed</span>
            <span class="metric-value" id="ui-vspeed">0.0</span>
        </div>
        <div class="metric">
            <span class="metric-title">Angle</span>
            <span class="metric-value" id="ui-angle">0.0°</span>
        </div>
        <div class="metric">
            <span class="metric-title">Position</span>
            <span class="metric-value" id="ui-pos">CENTER</span>
        </div>
    </div>

    <!-- Desktop Instructions -->
    <div class="controls">
        <kbd>↑</kbd> Main Engine (-0.3) &nbsp; | &nbsp; <kbd>←</kbd> Right Engine (-0.03) &nbsp; | &nbsp; <kbd>→</kbd> Left Engine (-0.03) &nbsp; | &nbsp; <b>Legs Contact (+20)</b>
    </div>

    <!-- Mobile Touch UI -->
    <div id="mobile-controls">
        <button id="btn-left" class="touch-btn">◀ Left</button>
        <button id="btn-main" class="touch-btn">▲ Main</button>
        <button id="btn-right" class="touch-btn">Right ▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Physics Constants (Tuned for 60fps to mimic Box2D Gymnasium feel)
        const GRAVITY = 0.05;
        const MAIN_THRUST = 0.15;
        const SIDE_THRUST = 0.03;
        const ROTATION_THRUST = 0.005;
        const DRAG = 0.999;
        const ANGULAR_DRAG = 0.95;

        // Terrain & Pad
        const GROUND_Y = 430;
        const PAD_X = 400;
        const PAD_WIDTH = 120;

        // Ship State
        let ship = {};
        let isGameOver = false;
        let keys = { ArrowUp: false, ArrowLeft: false, ArrowRight: false };
        let particles = [];

        // --- Keyboard Controls ---
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = true;
                e.preventDefault();
            }
            if (e.code === 'Space' && isGameOver) resetGame();
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        // --- Touch Controls (Mobile) ---
        function bindTouch(btnId, key) {
            const btn = document.getElementById(btnId);
            
            const press = (e) => { 
                e.preventDefault(); 
                keys[key] = true; 
                btn.classList.add('active'); 
            };
            const release = (e) => { 
                e.preventDefault(); 
                keys[key] = false; 
                btn.classList.remove('active'); 
            };
            
            // Touch events for mobile
            btn.addEventListener('touchstart', press, {passive: false});
            btn.addEventListener('touchend', release);
            btn.addEventListener('touchcancel', release);
            
            // Mouse events to let desktop users click the UI buttons too
            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        }

        bindTouch('btn-left', 'ArrowLeft');
        bindTouch('btn-main', 'ArrowUp');
        bindTouch('btn-right', 'ArrowRight');

        // --- Game Logic ---
        
        // Gymnasium's internal Dense Reward Shaping calculation
        function calculateShaping() {
            // Normalize distance to pad (0.0 is exactly on pad, ~1.0 is at corners)
            let dx = (ship.x - PAD_X) / (canvas.width / 2);
            // Normalizes Y using HALF the viewport height
            let dy = (ship.y - (GROUND_Y - 15)) / (canvas.height / 2); 
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            // Normalize velocity
            let nvx = ship.vx / 5.0;
            let nvy = ship.vy / 5.0;
            let vel = Math.sqrt(nvx*nvx + nvy*nvy);
            
            // Normalize angle
            let ang = Math.abs(ship.angle);
            
            // The magic formula: closer to 0 is better
            return -100 * dist - 100 * vel - 100 * ang;
        }

        function resetGame() {
            ship = {
                x: 400,
                y: 50,
                vx: (Math.random() - 0.5) * 4,
                vy: 0,
                angle: (Math.random() - 0.5) * 0.5,
                angular_vel: 0,
                fuel: 1000,
                reward: 0
            };
            // Initialize shaping at the start of the episode
            ship.prev_shaping = calculateShaping();
            isGameOver = false;
            particles = [];
            document.getElementById('overlay').style.display = 'none';
        }

        function createParticles(x, y, vx, vy, color, count=1) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: vx + (Math.random()-0.5)*1,
                    vy: vy + (Math.random()-0.5)*1,
                    life: 1.0,
                    color: color
                });
            }
        }

        function updatePhysics() {
            if (isGameOver) return;

            // 1. Process Inputs & Engines
            let thrusting_main = false;
            let thrusting_left = false;
            let thrusting_right = false;

            if (ship.fuel > 0) {
                if (keys.ArrowUp) {
                    thrusting_main = true;
                    ship.fuel -= 2;
                    ship.reward -= 0.3; // Gym penalty
                }
                if (keys.ArrowRight) {
                    thrusting_left = true;
                    ship.fuel -= 1;
                    ship.reward -= 0.03; // Gym penalty
                }
                if (keys.ArrowLeft) {
                    thrusting_right = true;
                    ship.fuel -= 1;
                    ship.reward -= 0.03; // Gym penalty
                }
            }

            // Calculate Force Vectors
            const sinA = Math.sin(ship.angle);
            const cosA = Math.cos(ship.angle);

            if (thrusting_main) {
                ship.vx += MAIN_THRUST * sinA;
                ship.vy -= MAIN_THRUST * cosA;
                createParticles(ship.x - 15*sinA, ship.y + 15*cosA, -ship.vx*0.5 + sinA*5, -ship.vy*0.5 + cosA*5, '#ff9800', 3);
            }

            if (thrusting_left) {
                ship.vx += SIDE_THRUST * cosA;
                ship.vy += SIDE_THRUST * sinA;
                ship.angular_vel += ROTATION_THRUST;
                createParticles(ship.x - 15*cosA, ship.y - 15*sinA, -cosA*3, -sinA*3, '#00bcd4', 1);
            }

            if (thrusting_right) {
                ship.vx -= SIDE_THRUST * cosA;
                ship.vy -= SIDE_THRUST * sinA;
                ship.angular_vel -= ROTATION_THRUST;
                createParticles(ship.x + 15*cosA, ship.y + 15*sinA, cosA*3, sinA*3, '#00bcd4', 1);
            }

            // 2. Apply Gravity & Kinematics
            ship.vy += GRAVITY;
            
            ship.vx *= DRAG;
            ship.vy *= DRAG;
            ship.angular_vel *= ANGULAR_DRAG;

            ship.x += ship.vx;
            ship.y += ship.vy;
            ship.angle += ship.angular_vel;

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // 3. Dense Reward Shaping Update!
            let current_shaping = calculateShaping();
            // Reward is the DIFFERENCE between the current state and the previous state
            ship.reward += (current_shaping - ship.prev_shaping);
            ship.prev_shaping = current_shaping;

            checkCollisions();
            updateDashboard();
        }

        function endGame(title, desc, isWin) {
            isGameOver = true;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('result-title').innerText = title;
            document.getElementById('result-title').style.color = isWin ? '#4CAF50' : '#F44336';
            document.getElementById('result-desc').innerText = desc;
            updateDashboard(); 
        }

        function checkCollisions() {
            // Out of bounds
            if (ship.x < 0 || ship.x > canvas.width || ship.y < 0) {
                ship.reward -= 100; // Terminal crash penalty
                endGame("Lost in Space!", `The lander flew out of the mission zone.\nFinal Score: ${ship.reward.toFixed(1)}`, false);
                return;
            }

            // Ground Collision
            if (ship.y + 15 >= GROUND_Y) {
                ship.y = GROUND_Y - 15;
                
                const isUpright = Math.abs(ship.angle) < 0.26; // ~15 degrees
                const isSlow = Math.abs(ship.vy) < 2.5 && Math.abs(ship.vx) < 2.0;
                const isOnPad = ship.x > (PAD_X - PAD_WIDTH/2) && ship.x < (PAD_X + PAD_WIDTH/2);

                if (isOnPad && isUpright && isSlow) {
                    ship.reward += 20;  // Gym bonus for Left & Right leg ground contact (+10 each)
                    ship.reward += 100; // Gym bonus for safe landing
                    endGame("Mission Accomplished!", `Perfect landing! (+20 Legs, +100 Bonus)\nFinal Score: ${ship.reward.toFixed(1)}`, true);
                } else if (!isOnPad) {
                    ship.reward -= 100; 
                    endGame("Crashed!", `You missed the landing pad.\nFinal Score: ${ship.reward.toFixed(1)}`, false);
                } else if (!isUpright) {
                    ship.reward -= 100;
                    endGame("Crashed!", `Lander tipped over! Angle was too steep.\nFinal Score: ${ship.reward.toFixed(1)}`, false);
                } else {
                    ship.reward -= 100;
                    endGame("Crashed!", `Impact velocity too high (Speed: ${ship.vy.toFixed(1)}).\nFinal Score: ${ship.reward.toFixed(1)}`, false);
                }
            }
        }

        function updateDashboard() {
            // Reward
            const rUi = document.getElementById('ui-reward');
            rUi.innerText = ship.reward.toFixed(1);
            if (ship.reward >= 200) rUi.className = 'metric-value safe'; // 200+ is the holy grail
            else if (ship.reward < 0) rUi.className = 'metric-value danger';
            else rUi.className = 'metric-value';

            // Fuel
            const fUi = document.getElementById('ui-fuel');
            fUi.innerText = Math.max(0, ship.fuel);
            fUi.className = ship.fuel < 200 ? 'metric-value danger' : 'metric-value safe';

            // Vertical Speed
            const vUi = document.getElementById('ui-vspeed');
            vUi.innerText = ship.vy.toFixed(1);
            if (ship.vy > 2.5) vUi.className = 'metric-value danger';
            else if (ship.vy > 1.5) vUi.className = 'metric-value warning';
            else vUi.className = 'metric-value safe';

            // Angle
            const aUi = document.getElementById('ui-angle');
            const deg = (ship.angle * 180 / Math.PI);
            aUi.innerText = Math.abs(deg).toFixed(1) + '°';
            if (Math.abs(deg) > 15) aUi.className = 'metric-value danger';
            else aUi.className = 'metric-value safe';

            // Position (relative to pad)
            const pUi = document.getElementById('ui-pos');
            if (ship.x < PAD_X - PAD_WIDTH/2) { pUi.innerText = 'TOO FAR LEFT'; pUi.className='metric-value warning'; }
            else if (ship.x > PAD_X + PAD_WIDTH/2) { pUi.innerText = 'TOO FAR RIGHT'; pUi.className='metric-value warning'; }
            else { pUi.innerText = 'ON TARGET'; pUi.className='metric-value safe'; }
        }

        function draw() {
            ctx.fillStyle = '#1e1e24';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(100, 100, 2, 2); ctx.fillRect(300, 50, 2, 2);
            ctx.fillRect(600, 200, 2, 2); ctx.fillRect(750, 80, 2, 2);

            ctx.fillStyle = '#333333';
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            ctx.lineTo(PAD_X - PAD_WIDTH/2 - 50, GROUND_Y);
            ctx.lineTo(PAD_X - PAD_WIDTH/2, GROUND_Y);
            ctx.lineTo(PAD_X + PAD_WIDTH/2, GROUND_Y);
            ctx.lineTo(PAD_X + PAD_WIDTH/2 + 50, GROUND_Y);
            ctx.lineTo(canvas.width, GROUND_Y);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fill();

            ctx.fillStyle = '#BB86FC';
            ctx.fillRect(PAD_X - PAD_WIDTH/2, GROUND_Y, PAD_WIDTH, 4);
            ctx.fillStyle = '#777';
            ctx.font = '12px Tahoma';
            ctx.textAlign = 'center';
            ctx.fillText("LANDING ZONE", PAD_X, GROUND_Y + 25);

            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            ctx.fillStyle = '#BB86FC'; 
            ctx.beginPath();
            ctx.moveTo(-12, -10); 
            ctx.lineTo(12, -10);  
            ctx.lineTo(15, 5);    
            ctx.lineTo(8, 12);    
            ctx.lineTo(-8, 12);   
            ctx.lineTo(-15, 5);   
            ctx.closePath();
            ctx.fill();
            ctx.lineWidth = 1;
            ctx.strokeStyle = '#fff';
            ctx.stroke();

            ctx.fillStyle = '#1e1e24';
            ctx.beginPath();
            ctx.arc(0, -3, 5, 0, Math.PI*2);
            ctx.fill();

            ctx.strokeStyle = '#aaaaaa';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-10, 8); ctx.lineTo(-15, 18); ctx.lineTo(-20, 18); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(10, 8); ctx.lineTo(15, 18); ctx.lineTo(20, 18); ctx.stroke();

            ctx.restore();
        }

        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        resetGame();
        gameLoop();
    </script>
</body>
</html>
